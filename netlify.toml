[build]
  command = "npm run build"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS    = "--legacy-peer-deps"

[functions]
  directory    = ".netlify/functions-internal"
  node_bundler = "esbuild"

# Fallback redirect jika _redirects tidak terbaca
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/server"
  status = 200
  force  = false
